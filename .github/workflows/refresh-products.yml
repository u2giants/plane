name: Refresh Products Table

on:
  workflow_dispatch:
  schedule:
    # Run daily at 06:00 UTC — after the nightly snapshot (which runs at 04:00 UTC)
    - cron: '0 6 * * *'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    name: Rebuild products + product_checkpoints from current D1 data

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild products table
        working-directory: scripts
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python build_products_table.py
