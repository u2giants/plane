name: Migrate D1 Database

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    name: Apply schema migration to D1

    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Run migration
        working-directory: integrations/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          wrangler d1 execute clickup-events \
            --file ../../scripts/migrate_robust_schema.sql \
            --remote

      - name: Verify tables
        working-directory: integrations/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          wrangler d1 execute clickup-events \
            --command "SELECT name, type FROM sqlite_master WHERE type IN ('table','view') ORDER BY type, name" \
            --remote
