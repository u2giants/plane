name: Populate list_space_map

on:
  workflow_dispatch:

jobs:
  populate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Execute list_space_map population
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Populating list_space_map via Wrangler..."
          wrangler d1 execute clickup-events \
            --file=scripts/populate_list_space_map.sql \
            --remote \
            --yes
          
          echo ""
          echo "Verifying..."
          wrangler d1 execute clickup-events \
            --remote \
            --command="SELECT space_name, COUNT(*) as cnt FROM list_space_map GROUP BY space_name" \
            --yes
