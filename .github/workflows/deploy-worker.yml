name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'integrations/worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy plane-integrations worker
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        working-directory: integrations/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy

      - name: Set CLICKUP_WEBHOOK_SECRET
        working-directory: integrations/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.CLICKUP_WEBHOOK_SECRET }}
        run: |
          if [ -n "$WEBHOOK_SECRET" ]; then
            echo "$WEBHOOK_SECRET" | wrangler secret put CLICKUP_WEBHOOK_SECRET
          else
            echo "CLICKUP_WEBHOOK_SECRET not set — skipping"
          fi

      - name: Set ANTHROPIC_API_KEY
        working-directory: integrations/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "$ANTHROPIC_API_KEY" | wrangler secret put ANTHROPIC_API_KEY
            echo "✓ ANTHROPIC_API_KEY set on Worker"
          else
            echo "ANTHROPIC_API_KEY not set — /query endpoint will return 500 until added"
          fi

      - name: Set QUERY_SECRET
        working-directory: integrations/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          QUERY_SECRET: ${{ secrets.QUERY_SECRET }}
        run: |
          if [ -n "$QUERY_SECRET" ]; then
            echo "$QUERY_SECRET" | wrangler secret put QUERY_SECRET
            echo "✓ QUERY_SECRET set — /query endpoint is bearer-token protected"
          else
            echo "QUERY_SECRET not set — /query endpoint is open (anyone with the URL can query)"
          fi

      - name: Health Check
        run: |
          sleep 3
          curl -s https://plane-integrations.u2giants.workers.dev/health | grep -q "ok" && echo "✓ Worker healthy" || exit 1
