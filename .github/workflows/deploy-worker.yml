name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'integrations/worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy plane-integrations worker
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        working-directory: integrations/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy

      - name: Set CLICKUP_WEBHOOK_SECRET
        working-directory: integrations/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.CLICKUP_WEBHOOK_SECRET }}
        run: |
          if [ -n "$WEBHOOK_SECRET" ]; then
            echo "$WEBHOOK_SECRET" | wrangler secret put CLICKUP_WEBHOOK_SECRET
          else
            echo "CLICKUP_WEBHOOK_SECRET not set — skipping (will set after ClickUp webhook registration)"
          fi

      - name: Health Check
        run: |
          sleep 3
          curl -s https://plane-integrations.u2giants.workers.dev/health | grep -q "ok" && echo "✓ Worker healthy" || exit 1

      - name: Notify on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: 'YOUR_CHANNEL_ID'
          payload: |
            {
              "text": "🚨 Worker deployment FAILED",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Failed*\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        continue-on-error: true
