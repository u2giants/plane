name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'integrations/worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy plane-integrations worker
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        working-directory: integrations/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy

      - name: Set CLICKUP_WEBHOOK_SECRET
        if: ${{ secrets.CLICKUP_WEBHOOK_SECRET != '' }}
        working-directory: integrations/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: echo "${{ secrets.CLICKUP_WEBHOOK_SECRET }}" | wrangler secret put CLICKUP_WEBHOOK_SECRET
