name: Re-enable ClickUp Webhook

on:
  workflow_dispatch:

jobs:
  reenable-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Re-enable suspended webhook
        run: |
          echo "Re-enabling suspended ClickUp webhook b114d599-aa9a-4069-b08f-a4bf0ac4fe20..."

          RESPONSE=$(curl -s -X PUT \
            "https://api.clickup.com/api/v2/webhook/b114d599-aa9a-4069-b08f-a4bf0ac4fe20" \
            -H "Authorization: ${{ secrets.CLICKUP_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"endpoint":"https://plane-integrations.u2giants.workers.dev/clickup/webhook","events":["taskCreated","taskUpdated","taskDeleted","taskMoved","taskCommentPosted","taskCommentUpdated","taskAssigneeUpdated","taskStatusUpdated","taskTimeEstimateUpdated","taskTimeTrackedUpdated","taskPriorityUpdated","taskDueDateUpdated","taskTagUpdated","listCreated","listUpdated","listDeleted","folderCreated","folderUpdated","folderDeleted","spaceCreated","spaceUpdated","spaceDeleted"],"status":"active"}')

          echo "Response: $RESPONSE"

          HEALTH=$(echo "$RESPONSE" | grep -o '"status":"[^"]*"' | head -1)
          echo "Webhook health: $HEALTH"
