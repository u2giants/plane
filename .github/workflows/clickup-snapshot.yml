name: ClickUp Workspace Snapshot

on:
  workflow_dispatch:
    inputs:
      include_closed:
        description: "Include closed tasks (true/false)"
        required: false
        default: "true"
  schedule:
    # Run daily at 02:00 UTC
    - cron: "0 2 * * *"

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Restore snapshot manifest (resume capability)
        uses: actions/cache@v4
        with:
          path: snapshot_output/_manifest.json
          key: clickup-manifest-${{ github.run_id }}
          restore-keys: |
            clickup-manifest-

      - name: Run ClickUp snapshot
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          CLICKUP_WORKSPACE_ID: ${{ secrets.CLICKUP_WORKSPACE_ID }}
          INCLUDE_CLOSED: ${{ github.event.inputs.include_closed || 'true' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/clickup_snapshot.py

      - name: Upload snapshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clickup-snapshot-${{ github.run_id }}
          path: snapshot_output/
          retention-days: 30
          compression-level: 0  # files are already gzip-compressed
